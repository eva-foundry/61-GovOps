# GovOps v3 — local-dev / contributor docker-compose stack.
#
# Phase H of PLAN-v3 — the adoption substrate. Run::
#
#   docker compose up
#
# on a clean machine with only Docker installed and you get a working
# two-process demo at http://localhost:8080 (web) + http://localhost:8000
# (FastAPI + Jinja fallback + JSON API). No Python venv, no Node install,
# no Bun lockfile fight — the contribution path opens up to non-engineers.
#
# Editing `lawcode/<jur>/` on the host hot-reloads inside the api
# container (bind mount + uvicorn auto-reload). Editing `web/src/` does
# the same on the web side via vite's HMR.
#
# This stack is DISTINCT from the top-level `Dockerfile` (which is the
# v2.1 hosted-demo single-container image used by the HF Space). They do
# not share build artefacts; you can use either independently.

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: govops-api:v3-dev
    container_name: govops-api
    ports:
      - "8000:8000"
    volumes:
      # Hot-reload substrate edits — `lawcode/` is the source of truth for
      # ConfigValue records (per ADR-010), so binding it here means a
      # contributor's edit to a YAML file shows up without a rebuild.
      - ./lawcode:/app/lawcode:rw
      # Same for schema/ — schema-validated YAML is the contract.
      - ./schema:/app/schema:rw
    environment:
      # Same defaults as `govops-demo`. In-memory SQLite means the
      # substrate re-hydrates from lawcode/ on every restart.
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: govops-web:v3-dev
    container_name: govops-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # SSR + browser routes hit the api service via compose DNS. The
      # `web/src/lib/api.ts` SSR-vs-browser branch reads this; the browser
      # branch falls back to relative URLs so vite's dev proxy can forward
      # `/api/*` to api:8000.
      VITE_API_BASE_URL: "http://api:8000"
