# yaml-language-server: $schema=../../../schema/lawcode-v1.0.json
# es/config/ei-rules.yaml — substrate values for ES Prestación por Desempleo (v3 Phase D).

defaults:
  domain: rule
  jurisdiction_id: es-ei
  effective_from: '1900-01-01'
values:
  - key: es-ei.rule.contribution.min_years
    value: 1
    value_type: number
    citation: Real Decreto Legislativo 8/2015, Art. 266 (360 días ≈ 1 año)
  - key: es-ei.rule.contribution.home_countries
    value: [ES, SPAIN, ESPANA, ESPAÑA]
    value_type: list
  - key: es-ei.rule.legal-status.accepted_statuses
    value: [citizen, permanent_resident]
    value_type: list
  - key: es-ei.rule.evidence.required_types
    value: [certificado_empresa]
    value_type: list
    citation: Real Decreto Legislativo 8/2015, Art. 268
  - key: es-ei.rule.duration.weeks_total
    value: 24
    value_type: number
    citation: Real Decreto Legislativo 8/2015, Art. 269
    rationale: 'Illustrative midpoint — escala oficial 120-720 días por 360-2160 días cotizados.'
  - key: es-ei.rule.duration.start_offset_days
    value: 0
    value_type: number
  - key: es-ei.rule.job-search.obligation_id
    value: es-sepe-active-search
    value_type: string
  - key: es-ei.rule.job-search.cadence
    value: monthly
    value_type: string
    citation: Real Decreto Legislativo 8/2015, Art. 300 (compromiso de actividad)
