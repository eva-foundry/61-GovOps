# Ukraine — Допомога по безробіттю (Unemployment Assistance) program manifest (v3 Phase D).
# Insurance-based benefit under Закон України «Про загальнообов'язкове державне
# соціальне страхування на випадок безробіття» (No. 1533-III, 2000).

schema_version: "1.0"
program_id: ei
jurisdiction_id: jur-ua-national
shape: unemployment_insurance
status: active

name:
  en: Unemployment Assistance (Допомога по безробіттю)
  uk: Допомога по безробіттю

description:
  en: Insurance-based unemployment benefit administered by the State Employment Service of Ukraine, requiring at least 26 weeks of insurance contributions in the last 12 months (Закон України No. 1533-III, 2000).
  uk: Страхова допомога по безробіттю, яку виплачує Державна служба зайнятості України; потребує не менше 26 тижнів страхового стажу за останні 12 місяців (Закон України № 1533-III, 2000).

