legal_documents:
  - id: doc-ua-ei-zakon-1533
    type: statute
    title: Закон України «Про загальнообов'язкове державне соціальне страхування на випадок безробіття»
    citation: Закон України № 1533-III від 02.03.2000
    effective_date: 2000-03-02
    sections:
      - id: sec-ua-ei-22
        ref: ст. 22
        heading: Умови та тривалість виплати допомоги по безробіттю
        text: >-
          Право на матеріальне забезпечення на випадок безробіття мають застраховані особи, визнані в установленому порядку безробітними, страховий стаж яких протягом 12 місяців, що передували реєстрації особи як безробітної, становить не менше 26 календарних тижнів.
      - id: sec-ua-ei-23
        ref: ст. 23
        heading: Тривалість виплати допомоги
        text: >-
          Загальна тривалість виплати допомоги по безробіттю не може перевищувати 360 календарних днів протягом двох років, а для осіб передпенсійного віку — 720 календарних днів.
      - id: sec-ua-ei-31
        ref: ст. 31
        heading: Обов'язки безробітного
        text: >-
          Безробітні зобов'язані відвідувати державну службу зайнятості у строки, встановлені цією службою, активно сприяти своєму працевлаштуванню та проходити перепідготовку чи підвищення кваліфікації.

rules:
  - id: rule-ei-contribution
    rule_type: residency_minimum
    description: Не менше 26 тижнів страхового стажу за останні 12 місяців
    formal_expression: insurance_weeks >= 26 in last 12 months
    citation: Закон України № 1533-III, ст. 22
    source_document_id: doc-ua-ei-zakon-1533
    source_section_ref: ст. 22
    param_key_prefix: ua-ei.rule.contribution
    parameters:
      min_years: { ref: ua-ei.rule.contribution.min_years }
      home_countries: { ref: ua-ei.rule.contribution.home_countries }

  - id: rule-ei-legal-status
    rule_type: legal_status
    description: Особа з правом на роботу в Україні
    formal_expression: "applicant.legal_status in ['citizen', 'permanent_resident']"
    citation: Закон України № 5067-VI, ст. 1
    source_document_id: doc-ua-ei-zakon-1533
    source_section_ref: ст. 22
    param_key_prefix: ua-ei.rule.legal-status
    parameters:
      accepted_statuses: { ref: ua-ei.rule.legal-status.accepted_statuses }

  - id: rule-ei-evidence
    rule_type: evidence_required
    description: Довідка про звільнення від останнього роботодавця
    formal_expression: has_evidence('dovidka_zvilnennia')
    citation: Закон України № 5067-VI, ст. 22
    source_document_id: doc-ua-ei-zakon-1533
    source_section_ref: ст. 22
    param_key_prefix: ua-ei.rule.evidence
    parameters:
      required_types: { ref: ua-ei.rule.evidence.required_types }

  - id: rule-ei-duration
    rule_type: benefit_duration_bounded
    description: Загальна тривалість виплати допомоги (до 360 днів)
    formal_expression: days <= 360 (720 for pre-retirement)
    citation: Закон України № 1533-III, ст. 23
    source_document_id: doc-ua-ei-zakon-1533
    source_section_ref: ст. 23
    param_key_prefix: ua-ei.rule.duration
    parameters:
      weeks_total: { ref: ua-ei.rule.duration.weeks_total }
      start_offset_days: { ref: ua-ei.rule.duration.start_offset_days }

  - id: rule-ei-job-search
    rule_type: active_obligation
    description: Активне сприяння працевлаштуванню та відвідування служби зайнятості
    formal_expression: active_cooperation AND service_visits
    citation: Закон України № 1533-III, ст. 31
    source_document_id: doc-ua-ei-zakon-1533
    source_section_ref: ст. 31
    param_key_prefix: ua-ei.rule.job-search
    parameters:
      obligation_id: { ref: ua-ei.rule.job-search.obligation_id }
      cadence: { ref: ua-ei.rule.job-search.cadence }

