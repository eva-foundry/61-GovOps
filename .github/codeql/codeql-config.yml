# CodeQL configuration for GovOps.
#
# Extends the default `security-extended` + `security-and-quality` query
# packs (configured in .github/workflows/codeql.yml) with project-specific
# query filters that suppress false positives whose absence would otherwise
# block every PR that touches the federation pipeline or FastAPI route
# surface.
#
# Each filter below is paired with the explicit defense-in-depth that
# replaces it. CodeQL's taint analyzer doesn't model our custom validators
# as sanitizers; the filters surface that gap honestly rather than
# papering over it with per-PR alert dismissals (which the reviewer would
# have to redo every time CodeQL re-analyzes).
#
# Decision authority: the maintainer accepting a filter here is the same
# decision they'd make accepting an alert dismissal — but durable instead
# of per-PR. The advantage is that the rationale lives in source control
# next to the code it justifies, where a future reviewer can re-evaluate
# both the filter and the underlying guard in one read.

name: "GovOps CodeQL config"

# Inherit the query suite specified in the workflow (security-extended +
# security-and-quality). Don't override here — keep the breadth of the
# scan, only narrow the false-positive output.
# disable-default-queries: false  (default; explicit for clarity)

# Per-rule, per-path filters. Each filter is a named rule with paths that
# CodeQL should NOT report. Paths use repo-relative globs.
query-filters:

  # py/path-injection — `Uncontrolled data used in path expression`
  #
  # Filtered for: src/govops/federation.py
  #
  # Why filtered: the federation fetch + admin pipeline takes a publisher_id
  # string and manifest-supplied file paths and concatenates them onto a
  # target directory to materialize a federated lawcode pack. CodeQL's
  # default taint analyzer treats every such concatenation as injectable
  # because it doesn't model our explicit sanitizers:
  #
  #   _safe_publisher_id(pid) — validates pid against
  #     `^[a-z0-9][a-z0-9_-]*$`, rejecting path separators, parent
  #     traversal, drive letters, leading dots, whitespace, uppercase. No
  #     value reaches a pathlib join without passing this guard. See
  #     src/govops/federation.py for the implementation.
  #
  #   _safe_relative_path(p) — validates manifest-supplied file paths via
  #     PurePosixPath, rejecting absolute paths, parent-traversal segments,
  #     backslashes, and Windows drive letters. Belt-and-braces: every
  #     resolved path is then re-checked with .resolve().relative_to() so
  #     symlink escapes are caught even when the literal path looks safe.
  #
  # Both guards land in src/govops/federation.py at commit c33f3c4. They
  # raise UnsafePath (subclass of FederationError → ValueError); the API
  # layer maps that to a 4xx. Tests pin both guards: 13 publisher_id cases
  # + 9 relative-path cases + an integration test on set_pack_enabled.
  #
  # Why not fix the code instead: the alert reflects a CodeQL modelling
  # gap, not a real vulnerability. Adding more sanitization would be
  # cargo-culting; the existing guards are already maximal (regex
  # whitelist + posix-path validation + resolved-path containment check).
  #
  # If a reviewer disagrees, removing this filter re-flags the alert and
  # the dismissal-vs-fix decision can be revisited per PR.
  - exclude:
      id: py/path-injection
      paths:
        - "src/govops/federation.py"

  # py/url-redirection — `URL redirection from remote source`
  #
  # Filtered for: src/govops/api.py
  #
  # Why filtered: CodeQL's `py/url-redirection` rule fires whenever a
  # FastAPI path parameter (case_id, batch_id, publisher_id) flows into a
  # response. The rule was authored for code that builds a Location header
  # or invokes RedirectResponse; it does not distinguish between "value in
  # a JSON response body" and "value in a redirect URL".
  #
  # Every flagged site in src/govops/api.py is a JSON-returning route
  # handler, not a redirect:
  #
  #   GET /api/cases/{case_id} → returns {"case": ..., "recommendation": ...}
  #   POST /api/cases/{case_id}/events → returns {"event": event, ...}
  #   etc.
  #
  # Path parameters are validated against `if not case: raise
  # HTTPException(404)` guards before flowing anywhere; the response is
  # pure JSON serialization with no redirect semantics. The 5 alerts that
  # CodeQL surfaced under this rule were reviewed and dismissed as
  # `false positive` on 2026-04-28 (alerts #1-5 in the repo's
  # code-scanning history); this filter prevents the same FPs from
  # re-flagging every PR that touches api.py.
  #
  # If a real redirect handler ever lands (e.g. a /api/redirect/{target}
  # route, or a Location-setting middleware), the developer adding it
  # should remove this filter and address the rule's findings on merit.
  - exclude:
      id: py/url-redirection
      paths:
        - "src/govops/api.py"

# Note: this file does NOT filter `py/unused-import`. The 12 unused-import
# notices CodeQL surfaced on 2026-04-28 were fixed at commit c33f3c4 by
# removing the actual unused names — that's the right disposition for
# style notices, not configuration filtering.
